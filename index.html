<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Happy Birthday, <span class="highlight">[Her Name]</span></h1>
            <p class="subtitle">To the most amazing person...</p>
            
            <div class="message">
                <p>Write your personal, heartfelt message here. You can make it as long as you want. Tell her why she's special, mention some favorite memories, and wish her the best year ahead.</p>
                <p>Love,<br>Jay</p>
            </div>

            <button id="confetti-btn">Click for a surprise 🎉</button>
        </div>
    </div>

    <canvas id="confetti-canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
