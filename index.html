<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생일 축하해!</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&family=Gamja+Flower&family=Gowun+Batang:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-hearts" id="bg-hearts"></div>
    
    <div class="container">
        <div class="card">
            <h1>Happy Birthday, <span class="highlight">서진 (Jinny)</span></h1>
            <p class="subtitle">세상에서 가장 소중한 당신에게...</p>
            
            <div class="message">
                <p>이곳에 당신의 진심이 담긴 메시지를 작성해 보세요. 좋아하는 추억을 떠올리며 그녀가 왜 당신에게 특별한 사람인지, 그리고 앞으로의 1년이 얼마나 행복하길 바라는지 적어주세요.</p>
                <p>사랑을 담아,<br>정민</p>
            </div>

            <div class="btn-container">
                <button id="confetti-btn">깜짝 선물을 확인해보세요! 🎉</button>
                <button id="plan-btn" style="display: none; margin-top: 15px; background: linear-gradient(45deg, #6a11cb, #2575fc);">우리의 데이트 코스 확인하기 📅</button>
            </div>
        </div>
    </div>

    <canvas id="confetti-canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
