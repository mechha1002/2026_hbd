<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생일 축하해!</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Noto+Serif+KR:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>생일 축하해, <span class="highlight">[이름]</span></h1>
            <p class="subtitle">세상에서 가장 소중한 당신에게...</p>
            
            <div class="message">
                <p>이곳에 당신의 진심이 담긴 메시지를 작성해 보세요. 좋아하는 추억을 떠올리며 그녀가 왜 당신에게 특별한 사람인지, 그리고 앞으로의 1년이 얼마나 행복하길 바라는지 적어주세요.</p>
                <p>사랑을 담아,<br>제이(Jay)</p>
            </div>

            <button id="confetti-btn">깜짝 선물을 확인해보세요! 🎉</button>
        </div>
    </div>

    <canvas id="confetti-canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
