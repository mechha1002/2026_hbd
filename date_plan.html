<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리의 데이트 계획 📅</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&family=Gamja+Flower&family=Gowun+Batang:wght@400;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>
<body class="plan-page">
    <div class="bg-hearts" id="bg-hearts"></div>

    <div class="container">
        <div class="card plan-card">
            <h1>Our Special Day 💖</h1>
            <p class="subtitle">오늘 하루, 당신을 위해 준비했어요.</p>
            
            <div class="schedule">
                <div class="item" data-time="2026-03-08T10:00:00" data-location="The Danforth Art Studio, Toronto">
                    <span class="time" data-original-time="11:00 - 12:30"></span>
                    <span class="activity" data-original="The Danforth Art Studio 🎨"></span>
                </div>
                <div class="item" data-time="2026-03-08T13:00:00" data-location="Brunch Cafe, Toronto">
                    <span class="time" data-original-time="1:00 - 2:30"></span>
                    <span class="activity" data-original="Brunch Cafe ☕️"></span>
                </div>
                <div class="item" data-time="2026-03-08T15:00:00" data-location="Cineplex Cinemas Yonge-Dundas and VIP, Toronto">
                    <span class="time" data-original-time="3:10 - 5:00"></span>
                    <span class="activity" data-original="Cineplex Yonge-Dundas and VIP (HOPPERS) 🎬"></span>
                </div>
                <div class="item" data-time="2026-03-08T18:30:00" data-location="Akira Back, Toronto">
                    <span class="time" data-original-time="6:30 - 8:00"></span>
                    <span class="activity" data-original="Dinner at Akira Back 🍣"></span>
                </div>
                <div class="item home" data-time="2026-03-08T20:00:00" data-location="">
                    <span class="time" data-original-time="Indefinitely"></span>
                    <span class="activity" data-original="Home Sweet Home 🏠🎁"></span>
                </div>
            </div>

            <button onclick="window.location.href='index.html'" class="back-btn">편지로 돌아가기</button>
        </div>
    </div>

    <script>
        // Check event times and reveal them if within 1 hour
        const checkSchedule = () => {
            const now = new Date();
            const items = document.querySelectorAll('.schedule .item');

            items.forEach(item => {
                const eventTimeStr = item.getAttribute('data-time');
                const locationQuery = item.getAttribute('data-location');
                const activitySpan = item.querySelector('.activity');
                const timeSpan = item.querySelector('.time');
                const originalText = activitySpan.getAttribute('data-original');
                const originalTime = timeSpan.getAttribute('data-original-time');

                if (eventTimeStr) {
                    const eventTime = new Date(eventTimeStr);
                    const diffMs = eventTime - now;
                    const oneHourMs = 60 * 60 * 1000;                              

                    // If current time is past (eventTime - 1 hour), reveal it
                    if (diffMs <= oneHourMs) {
                        timeSpan.innerHTML = originalTime;
                        if (locationQuery) {
                            const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(locationQuery)}`;
                            // Wrap the text in a link to Google Maps
                            activitySpan.innerHTML = `<a href="${mapUrl}" target="_blank" style="color: inherit; text-decoration: none; border-bottom: 2px solid var(--primary-color); padding-bottom: 2px; transition: opacity 0.2s;" onmouseover="this.style.opacity=0.7" onmouseout="this.style.opacity=1">${originalText} 📍</a>`;
                        } else {
                            activitySpan.innerHTML = originalText;
                        }
                        activitySpan.style.color = 'var(--text-dark)';
                        activitySpan.style.fontStyle = 'normal';
                    } else {
                        timeSpan.innerHTML = '??:??';
                        activitySpan.innerHTML = '비밀! 🔒';
                        activitySpan.style.color = '#aaa';
                        activitySpan.style.fontStyle = 'italic';
                    }
                }
            });
        };

        // Run initially and then check every minute
        checkSchedule();
        setInterval(checkSchedule, 60000);

        // Copy the heart animation logic for the plan page
        const createHeart = () => {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 4 + 's';
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            document.getElementById('bg-hearts').appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        };
        setInterval(createHeart, 300);
    </script>
</body>
</html>
